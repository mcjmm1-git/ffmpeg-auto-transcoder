###############################################################################
# USER CONFIGURATION
#
# Before running "docker compose up -d", update the values marked with:
# <<< CHANGE
###############################################################################

###############################################################################
# Media library location on the host
#
# This single host directory contains incoming, processing, library, completed,
# failed, logs and temp.
# <<< CHANGE
###############################################################################
x-host-media-path: &host_media_path "/mnt/dd2"

###############################################################################
# Application time zone
#
# Use an IANA time zone such as Europe/Madrid, America/New_York or UTC.
# This value is used by both containers and by the monitor finish-time display.
# <<< CHANGE
###############################################################################
x-time-zone: &time_zone "Europe/Madrid"

services:
  ffmpeg-auto-transcoder:
    container_name: ffmpeg-auto-transcoder

    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile

    restart: unless-stopped

    ############################################################################
    # User and group IDs
    #
    # Run "id" on the host and replace both numbers with your UID and GID.
    # <<< CHANGE
    ############################################################################
    user: "1000:1000"

    environment:

      ##########################################################################
      # Media directory inside the container.
      #
      # Do not change this path. Change x-host-media-path above instead.
      ##########################################################################
      MEDIA_DIR: /media

      ##########################################################################
      # Application time zone.
      #
      # Both variables are intentionally provided for compatibility with the
      # container, configuration loader and monitor.
      ##########################################################################
      TZ: *time_zone
      TIMEZONE: *time_zone

      ##########################################################################
      # Target movie size (GB)
      #
      # Recommended Full HD profile for a large projector screen:
      # approximately 16 GB for a 150-minute movie.
      # Increase for higher quality or reduce to save disk space.
      # <<< CHANGE
      ##########################################################################
      TARGET_GB: 16

      ##########################################################################
      # Reference duration used for dynamic bitrate calculation (minutes)
      # <<< CHANGE
      ##########################################################################
      TARGET_MIN: 150

      ##########################################################################
      # Minimum video bitrate (bits per second)
      #
      # 12000000 = 12 Mbps.
      # Recommended for Full HD projection on a large screen.
      # <<< CHANGE
      ##########################################################################
      MIN_VIDEO_BPS: 12000000

      ##########################################################################
      # Output resolution
      #
      # 7680 x 4320 = 8K UHD
      # 3840 x 2160 = 4K UHD
      # 2560 x 1440 = 1440p
      # 1920 x 1080 = Full HD
      # 1280 x 720  = HD
      #
      # <<< CHANGE
      ##########################################################################
      TARGET_W: 1920
      TARGET_H: 1080

      ##########################################################################
      # API keys
      #
      # Get your personal API keys from:
      # https://www.themoviedb.org/settings/api
      # https://www.omdbapi.com/apikey.aspx
      #
      # Never commit real API keys to GitHub.
      # <<< CHANGE
      ##########################################################################
      TMDB_API_KEY: ""
      OMDB_API_KEY: ""

    volumes:
      - type: bind
        source: *host_media_path
        target: /media

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities:
                - gpu

  ffmpeg-monitor:
    container_name: ffmpeg-monitor

    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile

    restart: unless-stopped

    depends_on:
      - ffmpeg-auto-transcoder

    # Share the transcoder PID namespace so monitor.sh can detect its process.
    pid: "service:ffmpeg-auto-transcoder"

    command:
      - ttyd
      - "-W"
      - "-p"
      - "7681"
      - "./monitor.sh"

    environment:

      ##########################################################################
      # Use the same media and time-zone configuration as the transcoder.
      ##########################################################################
      MEDIA_DIR: /media
      TZ: *time_zone
      TIMEZONE: *time_zone

    ############################################################################
    # Web monitor port
    #
    # Change only if port 9002 is already in use.
    # Change only the number on the left.
    # <<< CHANGE
    ############################################################################
    ports:
      - "9002:7681"

    volumes:
      - type: bind
        source: *host_media_path
        target: /media

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities:
                - gpu
